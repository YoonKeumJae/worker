name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check repository documents
        run: |
          test -f AGENTS.md
          test -f README.md
          test -f docs/PROJECT_SPEC.md
          test -f .github/pull_request_template.md

      - name: Detect Node project
        id: node_project
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.node_project.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        if: steps.node_project.outputs.exists == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.node_project.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run lint
        if: steps.node_project.outputs.exists == 'true'
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            pnpm run lint
          else
            echo "lint script not found. skipped."
          fi

      - name: Run tests
        if: steps.node_project.outputs.exists == 'true'
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            pnpm run test
          else
            echo "test script not found. skipped."
          fi

      - name: Run build
        if: steps.node_project.outputs.exists == 'true'
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            pnpm run build
          else
            echo "build script not found. skipped."
          fi
